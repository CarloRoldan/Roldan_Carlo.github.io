<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Apartados con Clic</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        .botones {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 0 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .apartado {
            display: none;
            padding: 20px;
            border: 2px solid #ccc;
            border-radius: 5px;
            max-width: 600px;
            margin: 0 auto;
        }
        .activo {
            display: block; /* Muestra el apartado seleccionado */
        }
    </style>

</head>

<body>

    <div class="botones">

        <button onclick="mostrarApartado('apartado1')">Sobrevivientes</button>

        <button onclick="mostrarApartado('apartado2')">Executioners</button>

    </div>

    <div id="apartado1" class="apartado activo">
        <h2>Apartado 1</h2>
  
      <p>¡Hola! Este es el contenido del **primer apartado**. Aquí puedes poner texto, imágenes o cualquier elemento.</p>
 
   </div>

   
 <div id="apartado2" class="apartado">
    
    <h2>Apartado 2</h2>
  
      <p>¡Bienvenido! Este es el contenido del **segundo apartado**. Funciona exactamente igual y se oculta el anterior al dar clic.</p>
  
  </div>

   
 <script>
        function mostrarApartado(idApartado) {
            // 1. Ocultar todos los apartados
            var apartados = document.getElementsByClassName('apartado');
            for (var i = 0; i < apartados.length; i++) {
                apartados[i].classList.remove('activo');
            }
            
            // 2. Mostrar solo el apartado que dio clic
            document.getElementById(idApartado).classList.add('activo');
        }
    </script>


</body>

</html>

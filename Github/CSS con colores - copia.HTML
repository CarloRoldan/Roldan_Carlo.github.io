﻿<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica de Títulos y Párrafos</title>
</head>

<body style="background-color: lightgray; font-family: Cambria;">

    <h1 style="color: yellow; background-color: blue; text-align: center; font-size: 50px; border: 3px solid black; font-family: Cambria;">
        Ejemplo 1
    </h1>

    <h2 style="color: red; background-color: lightgreen; text-align: right; font-size: 40px; padding: 10px; font-family: Cambria;">
        Ejemplo 2
    </h2>

    <h3 style="color: white; background-color: purple; text-align: left; font-size: 35px; font-family: Cambria;">
        Ejemplo 3
    </h3>

    <h4 style="color: black; background-color: orange; text-align: center; font-size: 30px; border-radius: 10px; font-family: Cambria;">
        Ejemplo 4
    </h4>

    <h5 style="color: navy; background-color: pink; text-align: left; font-size: 25px; letter-spacing: 3px; font-family: Cambria;">
        Ejemplo 5
    </h5>

    <h6 style="color: white; background-color: darkgreen; text-align: center; font-size: 20px; text-transform: uppercase; font-family: Cambria;">
        Ejemplo 6
    </h6>

    <p style="color: white; background-color: black; font-size: 22px; text-align: justify; padding: 10px; font-family: Cambria;">
        Este es el párrafo 1 con diferentes atributos CSS.
    </p>

    <p style="color: blue; background-color: yellow; font-size: 20px; text-align: center; border: 2px dashed red; font-family: Cambria;">
        Este es el párrafo 2 con otro estilo diferente.
    </p>

    <p style="color: darkred; background-color: lightblue; font-size: 18px; text-align: left; font-family: Cambria;">
        Este es el párrafo 3 usando diferentes colores y fuente.
    </p>

</body>

</html>
